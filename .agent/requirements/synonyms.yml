  记忆: [存储, 向量, memory, embedding, 嵌入]
  会话: [对话, session, conversation, 上下文]
  提示词: [系统提示, prompt, system prompt, 指令]
  技能: [能力, skill, 技能文件]
  调度: [定时任务, 计划任务, scheduler, cron, 定时器]
  桥接: [路由, bridge, 消息路由]
  敏感词: [违禁词, 内容过滤, banwords, 过滤词]
  自动回复: [关键词回复, keyword reply, 规则回复]
  管理员: [管理员命令, admin, godcmd]
