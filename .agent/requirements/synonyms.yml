# Domain Synonyms for Requirement Matching
# Format: key → [list of synonyms]
# Used to expand search terms when comparing requirements
# AI should actively add new synonym pairs discovered during work

software:
  登录: [认证, 鉴权, 身份验证, sign in, login, authentication, auth]
  需求: [要求, 规格, 功能点, requirement, spec, feature]
  搜索: [查询, 检索, find, search, query]
  权限: [授权, 访问控制, permission, authorization, access control]
  通知: [提醒, 告警, alert, notification, reminder]
  导出: [下载, 输出, export, download]
  导入: [上传, 输入, import, upload]
  配置: [设置, 参数, config, settings, preference]
  缓存: [暂存, cache, buffer]
  日志: [记录, log, logging]
  接口: [API, 端点, endpoint, route]
  数据库: [存储, 持久化, database, db, storage]
  测试: [验证, 检验, test, testing, verification]
  部署: [发布, 上线, deploy, release]
  性能: [效率, 速度, performance, optimization]
  安全: [防护, 加密, security, protection]
  用户: [账户, 使用者, user, account]
  页面: [视图, 界面, page, view, UI]
  错误: [异常, 故障, error, exception, fault]
  删除: [移除, 清除, delete, remove, clear]
  编辑: [修改, 更新, edit, modify, update]
  创建: [新增, 添加, create, add, new]
  列表: [清单, 目录, list, catalog]
  筛选: [过滤, 条件, filter, condition]
  排序: [排列, 顺序, sort, order]
  分页: [翻页, pagination, paging]
  响应式: [自适应, 移动端, responsive, adaptive, mobile]
  工具调用: [函数调用, Function Calling, tool_call, tool use]
  流式输出: [流式响应, 流式传输, streaming, SSE, server-sent events]
  语音合成: [TTS, 文本转语音, text to speech]
  语音识别: [ASR, 语音转文本, STT, speech to text]
  渠道: [通道, channel, 接入渠道, 消息渠道]
