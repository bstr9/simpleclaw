# ===========================================
# SonarQube 配置 - simpleclaw
# ===========================================

# 项目基本信息
sonar.projectKey=simpleclaw
sonar.projectName=SimpleClaw
sonar.projectVersion=1.0.0

# SonarQube Server 地址（本地 Docker 容器）
sonar.host.url=http://localhost:9000

# 源码路径
sonar.sources=cmd,pkg
sonar.tests=pkg

# Go 语言配置
sonar.go.coverage.reportPaths=coverage.out

# 测试文件模式
sonar.test.inclusions=**/*_test.go

# 排除配置
# 排除测试文件本身的覆盖率统计
sonar.coverage.exclusions=**/*_test.go,**/vendor/**,**/data/**

# 代码重复检测排除
sonar.cpd.exclusions=**/*_test.go,**/vendor/**

# 源码编码
sonar.sourceEncoding=UTF-8

# Go 测试覆盖率报告路径（多种格式支持）
# 如果使用 go test -coverprofile=coverage.out
sonar.go.coverage.reportPaths=coverage.out

# 如果使用 gocov 生成的报告
# sonar.go.coverage.reportPaths=coverage.json

# 排除生成的代码
sonar.exclusions=**/vendor/**,**/data/**,**/*.generated.go

# 分析范围
# 只分析 Go 代码
sonar.lang.patterns.go=**/*.go

# 忽略问题（可选，根据项目需要调整）
# sonar.issue.ignore.multicriteria=e1,e2

# e1: 忽略测试文件中的某些规则
# sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
# sonar.issue.ignore.multicriteria.e1.ruleKey=go:S1000

# 质量门禁（可选）
# sonar.qualitygate.wait=true
# sonar.qualitygate.timeout=300

# ===========================================
# 使用方法
# ===========================================
# 1. 生成覆盖率报告:
#    go test ./... -coverprofile=coverage.out
#
# 2. 运行 SonarQube 扫描:
#    sonar-scanner
#
# 3. 或在 CI 中使用:
#    参见 .github/workflows/sonarqube.yml
# ===========================================
